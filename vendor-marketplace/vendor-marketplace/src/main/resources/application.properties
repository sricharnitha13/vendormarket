spring.application.name=vendor-marketplace

server.port=${PORT:8082}

# Database

# Database properties are now handled by DatabaseConfig.java to support Render's postgres:// URLs
# automatically. No need to set them here.

# JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT

app.jwt.secret=${JWT_SECRET:default_secret_key_change_me_in_production}
app.jwt.expiration=86400000

# Groq

groq.api.key=${GROQ_API_KEY:default_groq_api_key}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama3-8b-8192}
